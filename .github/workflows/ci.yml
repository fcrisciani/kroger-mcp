name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: typecheck • test • build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # `wrangler deploy --dry-run` produces the actual Worker bundle without
      # uploading. Catches missing modules, syntax errors, and DO migration
      # mismatches. No Cloudflare credentials needed.
      - name: Build (wrangler dry-run)
        run: npm run build
